[pytest]
# The spine's definition of done is `pytest -q` = zero-skip green on native
# Windows. Without this, a bare `pytest` at the repo root would also collect
# tests_armor/, which imports PINT and only runs in the WSL2 armor env
# (journal/environment-armor.md) -- on Windows those would error at import and
# break the spine. `testpaths` scopes the DEFAULT (no-arg) collection to
# tests/ only. The armor suite is still run explicitly and ONLY in WSL:
#   /opt/galnav/venv/bin/python -m pytest tests_armor -q
testpaths = tests
